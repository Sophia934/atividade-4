<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Busca CEP por Endereço</h1>
        <p>Preencha os campos abaixo para encontrar o CEP.</p>
        
        <div class="form-group">
            <input type="text" id="uf" placeholder="UF (ex: SP)" maxlength="2">
            <input type="text" id="cidade" placeholder="Cidade (ex: Sorocaba)">
            <input type="text" id="logradouro" placeholder="Rua / Avenida">
            <button onclick="buscarCEP()">Buscar CEP</button>
        </div>

        <div id="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
